# Streamlit Cloud Secrets Configuration
# When deploying to Streamlit Cloud, add these secrets through the dashboard at:
# https://share.streamlit.io/ -> Select your app -> Settings -> Secrets

# TMDB API Key (required)
# Get your free API key from: https://www.themoviedb.org/settings/api
TMDB_API_KEY = "your_tmdb_api_key_here"

# FastAPI Backend URL (required for production)
# Example: "https://your-deployed-api.example.com"
# For local development, you can use: "http://127.0.0.1:8000"
API_BASE_URL = "http://127.0.0.1:8000"
